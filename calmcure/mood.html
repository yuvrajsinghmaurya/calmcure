<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="mood-page">

    <div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<h2>🧠 How are you feeling today?</h2>

<!-- MOOD OPTIONS -->
<div class="mood-options">
    <button onclick="selectMood('😊 Happy')">😊</button>
    <button onclick="selectMood('😐 Neutral')">😐</button>
    <button onclick="selectMood('😔 Sad')">😔</button>
    <button onclick="selectMood('😡 Angry')">😡</button>
    <button onclick="selectMood('😌 Calm')">😌</button>
</div>

<p id="selectedMoodText">Selected: None</p>

<!-- INTENSITY -->
<label>Intensity:</label>
<input type="range" min="1" max="5" id="intensity">

<!-- NOTE -->
<textarea id="note" placeholder="Write your thoughts..."></textarea>

<!-- SAVE -->
<button onclick="saveMood()">Save Mood</button>

<hr>

<!-- INSIGHTS -->
<h3>📊 Insights</h3>
<p id="insights"></p>

<h3>📊 Mood Graph</h3>
<div class="graph-container">
    <h3>📊 Mood Analytics</h3>
    <canvas id="moodChart"></canvas>
</div>

<!-- HISTORY -->
<h3>📅 Mood History</h3>
<div id="history"></div>

<script src="js/app.js"></script>

</body>
</html>
