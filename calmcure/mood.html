<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Tracker - CalmCure</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="mood-page">

<!-- 🌿 BACKGROUND LEAVES -->
<div class="bg-leaves">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- NAVBAR -->
<header class="navbar">
    <a href="index.html" class="brand">CalmCure <span>🌿</span></a>
    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="mood.html">Mood</a>
        <a href="journal.html">Journal</a>
        <a href="progress.html">Progress</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="container" style="margin-top: 80px; background: rgba(255,255,255,0.9); padding: 30px; border-radius: 12px; max-width: 800px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">

    <h2 style="text-align: center;">🧠 How are you feeling today?</h2>

    <!-- MOOD OPTIONS -->
    <div class="mood-options" style="text-align: center; margin-top: 20px;">
        <button onclick="selectMood('😊 Happy')" style="font-size: 24px; margin: 5px;">😊</button>
        <button onclick="selectMood('😐 Neutral')" style="font-size: 24px; margin: 5px;">😐</button>
        <button onclick="selectMood('😔 Sad')" style="font-size: 24px; margin: 5px;">😔</button>
        <button onclick="selectMood('😡 Angry')" style="font-size: 24px; margin: 5px;">😡</button>
        <button onclick="selectMood('😌 Calm')" style="font-size: 24px; margin: 5px;">😌</button>
    </div>

    <p id="selectedMoodText" style="text-align: center; font-weight: bold; margin-top: 15px;">Selected: None</p>

    <div style="margin-top: 20px;">
        <!-- INTENSITY -->
        <label style="display: block; font-weight: bold;">Intensity (1-5):</label>
        <input type="range" min="1" max="5" id="intensity" style="width: 100%; margin-top: 5px;">
    </div>

    <!-- NOTE -->
    <div style="margin-top: 20px;">
        <label style="display: block; font-weight: bold;">Note (optional):</label>
        <textarea id="note" placeholder="Write your thoughts..." style="width: 100%; height: 80px; margin-top: 5px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;"></textarea>
    </div>

    <!-- SAVE -->
    <button onclick="saveMood()" style="width: 100%; margin-top: 20px; padding: 12px; font-size: 16px;">Save Mood</button>

    <hr style="margin: 30px 0;">

    <!-- INSIGHTS -->
    <h3>📊 Insights</h3>
    <p id="insights">Loading...</p>

    <!-- MOOD GRAPH -->
    <div class="graph-container" style="margin-top: 30px;">
        <h3>📊 Mood Analytics</h3>
        <canvas id="moodChart"></canvas>
    </div>

    <!-- HISTORY -->
    <h3 style="margin-top: 30px;">📅 Mood History</h3>
    <div id="history"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
