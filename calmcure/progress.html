<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker - CalmCure</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard-page">

<!-- 🌿 BACKGROUND LEAVES -->
<div class="bg-leaves">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- NAVBAR -->
<header class="navbar">
    <a href="index.html" class="brand">CalmCure <span>🌿</span></a>
    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="mood.html">Mood</a>
        <a href="journal.html">Journal</a>
        <a href="progress.html">Progress</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="container" style="margin-top: 80px; max-width: 800px; margin-left: auto; margin-right: auto;">

    <!-- 🌿 HEADER -->
    <header style="text-align:center; padding:20px; background: rgba(255,255,255,0.9); border-radius: 12px; margin-bottom: 20px;">
        <h1>📊 Your Progress Tracker</h1>
        <h3 id="usernameDisplay"></h3>
    </header>

    <!-- 📈 GRAPH SECTION -->
    <section>
        <div style="background: rgba(255,255,255,0.9); padding:20px; border-radius:12px; margin-bottom: 20px;">
            <h2>📈 Mood Analytics (Last 30 Days)</h2>
            <canvas id="moodChart"></canvas>
        </div>
    </section>

    <!-- 📌 INSIGHTS -->
    <section>
        <div style="background: rgba(255,255,255,0.9); padding:20px; border-radius:12px; margin-bottom: 20px;">
            <h3>🧠 Insights</h3>
            <p id="insights">Loading...</p>
        </div>
    </section>

    <!-- 🚪 ACTIONS -->
    <section style="text-align:center; margin:30px;">
        <button onclick="window.location.href='mood.html'" style="padding: 10px 20px; font-size: 16px;">
            ➕ Add Mood
        </button>
    </section>

</div>

<!-- JS -->
<script src="js/app.js"></script>

</body>
</html>
