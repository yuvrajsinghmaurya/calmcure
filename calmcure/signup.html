<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalmCure - Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-leaves">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- SIGNUP -->
<section class="login-section">

    <div class="login-card">

        <h2>Create Account 🌿</h2>

        <form id="signupForm">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">Sign Up</button>
        </form>

        <p class="small-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</section>

<!-- JS -->
<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.querySelectorAll("input")[0].value;
    let email = document.querySelectorAll("input")[1].value;
    let pass = document.querySelectorAll("input")[2].value;
    let confirm = document.querySelectorAll("input")[3].value;

    if(pass !== confirm){
        alert("Passwords do not match");
        return;
    }

    localStorage.setItem("user_" + email, JSON.stringify({
        name: name,
        password: pass
    }));

    alert("Signup successful!");
    window.location.href = "login.html";
});
</script>

</body>
</html>
