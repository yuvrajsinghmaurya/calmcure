<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journaling - CalmCure</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="journal-page">

<!-- 🌿 BACKGROUND LEAVES -->
<div class="bg-leaves">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- NAVBAR -->
<header class="navbar">
    <a href="index.html" class="brand">CalmCure <span>🌿</span></a>
    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="mood.html">Mood</a>
        <a href="journal.html">Journal</a>
        <a href="progress.html">Progress</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="container" style="margin-top: 80px; background: rgba(255,255,255,0.9); padding: 30px; border-radius: 12px; max-width: 800px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">

    <h2 style="text-align: center;">📖 Your Safe Space</h2>
    <p style="text-align: center; color: #555;">Write your thoughts freely. This space is just for you.</p>

    <!-- 🎤 VOICE INPUT (Placeholder for future) -->
    <div style="margin-top: 20px;">
        <button onclick="startVoice()" style="background: #e3f2fd; color: #0277bd; border: 1px solid #0277bd;">🎤 Speak</button>
    </div>

    <!-- 😊 MOOD TAG -->
    <div class="mood-tag" style="margin-top: 15px;">
        <label>Tag your mood:</label>
        <select id="journalMood" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
            <option value="">Select Mood</option>
            <option>😊 Happy</option>
            <option>😐 Neutral</option>
            <option>😔 Sad</option>
            <option>😡 Angry</option>
            <option>😌 Calm</option>
        </select>
    </div>

    <!-- 🧠 AI REFLECTION -->
    <div id="aiReflection" class="ai-box" style="margin-top: 15px; font-style: italic; color: #388e3c;"></div>

    <!-- JOURNAL INPUT -->
    <textarea id="journalInput" placeholder="Start writing your thoughts..." style="width: 100%; height: 150px; margin-top: 15px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;"></textarea>

    <br>
    <button onclick="saveJournal()" style="margin-top: 10px; width: 100%;">Save Entry</button>

    <hr style="margin: 30px 0;">

    <!-- JOURNAL HISTORY -->
    <h3>📝 Your Entries</h3>
    
    <!-- 📅 FILTER BY DATE -->
    <div style="margin-bottom: 15px;">
        <label>Filter by Date: </label>
        <input type="date" id="filterDate" onchange="filterByDate()" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
    </div>

    <div id="journalHistory"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
